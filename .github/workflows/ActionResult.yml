name: ActionResult

on:
  workflow_run:
    workflows:
      - DebugBuild
      - ReleaseBuild
    types: 
      - completed
	  
jobs:
  command:
    name: ActionResult
    runs-on: ubuntu-24.04
    steps:				
      - name: Dicord Notification
        uses: sarisia/actions-status-discord@v1 
        with:
					webhook: ${{ secrets.DISCORD_WEBHOOK }}
					username: GitHub
					avatar_url: https://github.githubassets.com/assets/GitHub-Mark-ea2971cee799.png
